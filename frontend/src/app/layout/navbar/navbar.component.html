<nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 fixed w-full top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex">
        <div class="flex-shrink-0 flex items-center">
          <a routerLink="/" class="text-xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">
            ExpenseTracker
          </a>
        </div>
        @if (authService.isAuthenticated$ | async) {
          <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
            <a routerLink="/dashboard" routerLinkActive="border-indigo-500 text-gray-900" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Dashboard
            </a>
            <a routerLink="/expenses" routerLinkActive="border-indigo-500 text-gray-900" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Expenses
            </a>
          </div>
        }
      </div>
      <div class="hidden sm:ml-6 sm:flex sm:items-center">
        @if (authService.isAuthenticated$ | async) {
          <div>
            <button (click)="logout()" class="ml-4 px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-sm transition-all">
              Logout
            </button>
          </div>
        } @else {
          <div class="space-x-4">
            <a routerLink="/login" class="text-gray-500 hover:text-gray-900 text-sm font-medium">Log in</a>
            <a routerLink="/register" class="px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none shadow-sm transition-all">Sign up</a>
          </div>
        }
      </div>
    </div>
  </div>
</nav>
