<div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 border border-gray-100">
  <div class="flex justify-between items-center mb-6">
    <h3 class="text-xl font-bold text-gray-900">{{ isEdit ? 'Edit Expense' : 'Add New Expense' }}</h3>
    <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600 transition">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <form [formGroup]="expenseForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Title</label>
      <input type="text" formControlName="title" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Amount</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span class="text-gray-500 sm:text-sm">$</span>
          </div>
          <input type="number" step="0.01" formControlName="amount" class="focus:ring-indigo-500 focus:border-indigo-500 block w-full pl-7 pr-12 sm:text-sm border-gray-300 rounded-md py-2 border">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Date</label>
        <input type="date" formControlName="date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Category</label>
      <select formControlName="category" (change)="onCategoryChange($event)" class="mt-1 block w-full bg-white rounded-md border border-gray-300 shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        <option value="ADD_NEW">+ Add New Category...</option>
      </select>
      <div *ngIf="showNewCategoryInput" class="mt-2">
        <input type="text" formControlName="newCategory" placeholder="Enter new category name" class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Notes (Optional)</label>
      <textarea formControlName="notes" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border"></textarea>
    </div>

    <div class="mt-6 flex justify-end space-x-3">
      <button type="button" (click)="onCancel()" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Cancel
      </button>
      <button type="submit" [disabled]="expenseForm.invalid" class="bg-indigo-600 border border-transparent rounded-md shadow-sm py-2 px-4 inline-flex justify-center text-sm font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 transition">
        {{ isEdit ? 'Update' : 'Save' }}
      </button>
    </div>
  </form>
</div>
